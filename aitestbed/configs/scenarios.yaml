    max_tool_calls: 15
    prompts:
      - "Navigate to https://example.com, extract the page title and all visible text, and summarize what you see."
      - "Go to https://httpbin.org/forms/post, fill in the form fields with test data, submit it, and verify the response."

  playwright_web_test_text:
    type: "playwright_agent"
    inter_prompt_delay_sec: 0  # sec between prompts; 0 = back-to-back
    description: "Browser automation agent using text extraction (no screenshots)"
    provider: "openai"
    model: "gpt-5-mini"
    server_group: "playwright"
    mcp_transport: "http"
    loopback_interface: "lo"
    max_tool_calls: 15
    use_screenshots: false
    prompts:
      - "Navigate to https://example.com and extract all headings and links on the page."
      - "Go to https://httpbin.org/get, read the JSON response displayed on the page, and summarize it."

  # =============================================================================
  # Direct Web Search Scenarios (No MCP - Multi-threaded HTTP)
  # =============================================================================

  direct_web_search:
    type: "direct_search"
    inter_prompt_delay_sec: 0  # sec between prompts; 0 = back-to-back
    description: "Multi-threaded web search without MCP, using direct HTTP"
    provider: "openai"
    model: "gpt-5-mini"
    search_engine: "brave"  # Options: google, duckduckgo, brave
    thread_count: 5
    search_timeout: 30.0
    max_results: 10
    synthesize_with_llm: true
    stream: false
    queries:
      - "6G wireless technology latest developments 2026"
      - "AI traffic patterns mobile networks research"
      - "3GPP release 19 AI/ML features"
      - "machine learning network optimization techniques"
      - "edge computing AI inference latency measurements"

  direct_web_search_google:
    type: "direct_search"
    inter_prompt_delay_sec: 0  # sec between prompts; 0 = back-to-back
    description: "Multi-threaded web search using Google Custom Search API"
    disabled: true
    provider: "openai"
    model: "gpt-5-mini"
    search_engine: "google"
    thread_count: 5
    search_timeout: 30.0
    max_results: 10
    synthesize_with_llm: true
    queries:
      - "generative AI network traffic characteristics"
      - "LLM inference latency requirements"
      - "mobile AI services QoE metrics"
      - "6G media streaming requirements"
      - "AI agent communication protocols"

  direct_web_search_burst:
    type: "direct_search"
    inter_prompt_delay_sec: 0  # sec between prompts; 0 = back-to-back
    description: "High-parallelism burst search (stress test)"
    provider: "openai"
    model: "gpt-5-mini"
    search_engine: "brave"
    thread_count: 20
    search_timeout: 60.0
    max_results: 5
    synthesize_with_llm: false  # Skip LLM to measure pure search traffic
    queries:
      - "artificial intelligence trends"
      - "machine learning applications"
      - "deep learning research"
      - "neural network architecture"
      - "computer vision advances"
      - "natural language processing"
      - "reinforcement learning robotics"
      - "generative AI models"
      - "AI safety research"
      - "explainable AI methods"
      - "federated learning privacy"
      - "AI edge computing"
      - "AI model optimization"
      - "transformer architecture"
      - "AI hardware accelerators"
      - "AI cloud services"
      - "AI API providers"
      - "AI model deployment"
      - "AI inference optimization"
      - "AI training efficiency"

  parallel_search_benchmark:
    type: "parallel_search_benchmark"
    inter_prompt_delay_sec: 0  # sec between prompts; 0 = back-to-back
    description: "Benchmark parallel search performance with varying thread counts"
    provider: "openai"
    model: "gpt-5-mini"
    search_engine: "duckduckgo"
    thread_counts: [1, 2, 5, 10, 20]
    queries_per_run: 20
    search_timeout: 30.0
    queries:
      - "artificial intelligence"
      - "machine learning"
      - "deep learning"
      - "neural networks"
      - "computer vision"

# Default experiment settings
defaults:
  runs_per_scenario: 10          # Direct-orchestrator default; run_full_tests.sh overrides globally
  inter_run_delay_sec: 3.0        # Increased from 1.0 to avoid rate limits
  timeout_sec: 180                 # Increased for slow network profiles
  retry_count: 3
  retry_backoff_sec: 5.0          # Increased backoff for rate limit recovery
  retry_backoff_multiplier: 2.0
  stall_gap_sec: 1.0
  burst_gap_sec: 1.0

# Full-suite runner profile set.
# Mirrors configs/profiles.yaml:selected_profiles so the matrix matches run_full_tests.sh.
runner_profile_sets:
  full_suite_profiles: &full_suite_profiles
    - no_emulation
    - 6g_itu_hrllc
    - 5g_urban
    - wifi_good
    - cell_edge
    - satellite_leo
    - satellite_geo
    - congested
    - 5qi_7
    - 5qi_80

