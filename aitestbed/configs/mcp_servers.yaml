# MCP Server Configurations for 6G AI Traffic Testbed
#
# This file defines the MCP servers used for real tool execution
# in agentic AI scenarios.
#
# Prerequisites:
#   - Node.js >= 18 (for npx-based servers)
#   - API keys for services requiring authentication
#
# Environment Variables Required:
#   - BRAVE_API_KEY: For Brave Search server (get at https://brave.com/search/api/)

mcpServers:
  # Web Search - Uses Brave Search API
  # Provides: brave_web_search, brave_local_search
  brave-search:
    name: brave-search
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-brave-search"
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
    description: "Web search using Brave Search API"
    tools:
      - brave_web_search
      - brave_local_search

  # HTTP Fetch - Fetches content from URLs (Python-based MCP server)
  # Provides: fetch
  # Install: pip install mcp-server-fetch  (or use uvx mcp-server-fetch)
  fetch:
    name: fetch
    command: python
    args:
      - "-m"
      - "mcp_server_fetch"
    env: {}
    description: "Fetch content from URLs with robot.txt compliance"
    tools:
      - fetch

  # Filesystem - Read/write files (sandboxed)
  # Provides: read_file, write_file, list_directory, etc.
  filesystem:
    name: filesystem
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/tmp/testbed-sandbox"  # Sandboxed directory
    env: {}
    description: "Sandboxed filesystem access"
    tools:
      - read_file
      - write_file
      - list_directory
      - create_directory
      - move_file
      - search_files
      - get_file_info

  # Spotify Music - Search tracks, artists, albums, playlists; browse discography
  # Provides: spotify_search_tracks, spotify_search_artists, spotify_search_albums,
  #           spotify_search_playlists, spotify_artist_albums, spotify_album_tracks
  # Install: pip install requests (included in requirements.txt)
  # Auth: https://developer.spotify.com/dashboard → Create app → Get client ID/secret
  spotify:
    name: spotify
    command: python
    args:
      - "-m"
      - "mcp_servers.spotify_server"
    env:
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET}"
    description: "Spotify music search and playlist discovery"
    supports_http: true
    tools:
      - spotify_search_tracks
      - spotify_search_artists
      - spotify_search_albums
      - spotify_search_playlists
      - spotify_artist_albums
      - spotify_album_tracks

  # Playwright - Browser automation using headless Chromium
  # Provides: playwright_navigate, playwright_screenshot, playwright_click,
  #           playwright_fill, playwright_get_text, playwright_evaluate
  # Install: pip install playwright && playwright install chromium
  playwright:
    name: playwright
    command: python
    args:
      - "-m"
      - "mcp_servers.playwright_server"
    env: {}
    description: "Browser automation using Playwright"
    supports_http: true
    tools:
      - playwright_navigate
      - playwright_screenshot
      - playwright_click
      - playwright_fill
      - playwright_get_text
      - playwright_evaluate

  # Alpaca Market Data - Stock, crypto, and options market data
  # Provides: get_stock_bars, get_stock_latest_quote, get_stock_latest_trade,
  #           get_stock_snapshot, get_crypto_bars, get_crypto_latest_quote,
  #           get_crypto_snapshot, get_option_contracts, get_option_latest_quote,
  #           get_asset, get_all_assets, get_calendar, get_clock
  # Install: pip install uv  (provides uvx)
  #          uvx alpaca-mcp-server init
  # Auth: https://app.alpaca.markets/signup → API Keys
  # NOTE: Market data API key only — no trading/account/portfolio tools.
  # The Alpaca server is stdio-only, so we wrap it with http_bridge
  # to route traffic over HTTP (subject to tc/netem on loopback).
  alpaca:
    name: alpaca
    command: python
    args:
      - "-m"
      - "mcp_servers.http_bridge"
      - "uvx"
      - "alpaca-mcp-server"
    env:
      ALPACA_API_KEY: "${ALPACA_API_KEY}"
      ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY}"
    description: "Stock, crypto, and options market data via Alpaca"
    supports_http: true
    tools:
      - get_stock_bars
      - get_stock_quotes
      - get_stock_trades
      - get_stock_latest_bar
      - get_stock_latest_quote
      - get_stock_latest_trade
      - get_stock_snapshot
      - get_crypto_bars
      - get_crypto_quotes
      - get_crypto_trades
      - get_crypto_latest_quote
      - get_crypto_latest_bar
      - get_crypto_latest_trade
      - get_crypto_snapshot
      - get_crypto_latest_orderbook
      - get_option_contracts
      - get_option_latest_quote
      - get_option_snapshot
      - get_asset
      - get_all_assets
      - get_calendar
      - get_clock

  # Memory - Persistent key-value store
  # Provides: store, retrieve, list_keys
  memory:
    name: memory
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-memory"
    env: {}
    description: "Persistent memory for agent context"
    tools:
      - store
      - retrieve
      - list_keys

# Server Groups for Different Scenarios
serverGroups:
  # Web Research Agent - search and fetch
  web_research:
    - brave-search
    - fetch
    - memory

  # Shopping Agent - search for products (uses web search)
  shopping:
    - brave-search
    - fetch

  # Music Agent - Spotify search and recommendations
  music:
    - spotify

  # Music Research Agent - Spotify + web search
  music_research:
    - spotify
    - brave-search
    - fetch

  # Trading / market data agent (Alpaca)
  trading:
    - alpaca

  # Playwright browser automation agent
  playwright:
    - playwright

  # General Purpose Agent
  general:
    - brave-search
    - fetch
    - filesystem
    - memory
    - spotify
    - playwright
    - alpaca

# Tool Aliases for Backward Compatibility
# Maps old mock tool names to MCP tool names
toolAliases:
  web_search: brave_web_search
  search_products: brave_web_search
  fetch_url: fetch
  check_price: brave_web_search  # Will search for product prices

# Rate Groups - shared budgets across multiple tools
# Spotify enforces a single global rate limit across all endpoints,
# so all spotify_* tools must share one sliding window.
rateGroups:
  spotify_global:
    requests_per_minute: 30
  alpaca_global:
    requests_per_minute: 60

# Rate Limiting Configuration
rateLimits:
  brave_web_search:
    requests_per_minute: 15
    requests_per_day: 2000
  fetch:
    requests_per_minute: 30
    concurrent_max: 5
  spotify_search_tracks:
    rate_group: spotify_global
  spotify_search_artists:
    rate_group: spotify_global
  spotify_search_albums:
    rate_group: spotify_global
  spotify_search_playlists:
    rate_group: spotify_global
  spotify_artist_albums:
    rate_group: spotify_global
  spotify_album_tracks:
    rate_group: spotify_global
  playwright_navigate:
    requests_per_minute: 30
    concurrent_max: 3
  playwright_screenshot:
    requests_per_minute: 20
    concurrent_max: 2
  get_stock_latest_quote:
    rate_group: alpaca_global
  get_stock_bars:
    rate_group: alpaca_global
  get_stock_snapshot:
    rate_group: alpaca_global
  get_stock_latest_trade:
    rate_group: alpaca_global
  get_crypto_latest_quote:
    rate_group: alpaca_global
  get_crypto_bars:
    rate_group: alpaca_global
  get_crypto_snapshot:
    rate_group: alpaca_global
  get_option_contracts:
    rate_group: alpaca_global
  get_option_latest_quote:
    rate_group: alpaca_global
