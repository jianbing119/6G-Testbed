# Selected network profile subset for 6G AI traffic studies.
# Includes the eight-profile core set plus a no-emulation reference case.

selected_profiles:
  - no_emulation
  - ideal_6g
  - 5g_urban
  - wifi_good
  - cell_edge
  - satellite
  - congested
  - 5qi_7
  - 5qi_80

profiles:
  no_emulation:
    description: "Reference case with no tc/netem impairment applied"
    delay_ms: 0
    jitter_ms: 0
    delay_distribution: fixed
    loss_pct: 0.0
    loss_correlation_pct: 0
    reorder_pct: 0.0
    reorder_correlation_pct: 0
    duplicate_pct: 0.0
    limit_packets: null
    rate_mbit: null

  ideal_6g:
    description: "Deterministic baseline and upper-bound reference"
    delay_ms: 1
    jitter_ms: 0
    delay_distribution: fixed
    loss_pct: 0.0
    loss_correlation_pct: 0
    reorder_pct: 0.0
    reorder_correlation_pct: 0
    duplicate_pct: 0.0
    limit_packets: 1000
    rate_mbit: null

  5g_urban:
    description: "Mainstream terrestrial cellular reference"
    delay_ms: 20
    jitter_ms: 5
    delay_distribution: normal
    loss_model: correlated
    loss_pct: 0.1
    loss_correlation_pct: 25
    reorder_pct: 0.02
    reorder_correlation_pct: 50
    duplicate_pct: 0.01
    limit_packets: 1000
    rate_mbit: 100

  wifi_good:
    description: "Non-3GPP local access with moderate contention"
    delay_ms: 30
    jitter_ms: 10
    delay_distribution: normal
    loss_model: correlated
    loss_pct: 0.1
    loss_correlation_pct: 30
    reorder_pct: 0.05
    reorder_correlation_pct: 50
    duplicate_pct: 0.02
    limit_packets: 800
    rate_mbit: 50

  cell_edge:
    description: "Weak radio and heavy-tail jitter case"
    delay_ms: 120
    jitter_ms: 30
    delay_distribution: paretonormal
    loss_model: gemodel
    loss_pct: 1.0
    loss_correlation_pct: 35
    reorder_pct: 0.1
    reorder_correlation_pct: 50
    duplicate_pct: 0.05
    limit_packets: 400
    rate_mbit: 5

  satellite:
    description: "Remote-access and extreme RTT case"
    delay_ms: 600
    jitter_ms: 50
    delay_distribution: normal
    loss_model: gemodel
    loss_pct: 0.5
    loss_correlation_pct: 20
    reorder_pct: 0.02
    reorder_correlation_pct: 50
    duplicate_pct: 0.0
    limit_packets: 600
    rate_mbit: 10

  congested:
    description: "Bufferbloat and strong congestion stress case"
    delay_ms: 200
    jitter_ms: 50
    delay_distribution: pareto
    loss_model: gemodel
    loss_pct: 3.0
    loss_correlation_pct: 40
    reorder_pct: 0.2
    reorder_correlation_pct: 50
    duplicate_pct: 0.05
    limit_packets: 200
    rate_mbit: 1

  5qi_7:
    description: "Managed conversational and live-streaming anchor"
    delay_ms: 100
    jitter_ms: 10
    delay_distribution: normal
    loss_model: correlated
    loss_pct: 0.1
    loss_correlation_pct: 20
    reorder_pct: 0.02
    reorder_correlation_pct: 50
    duplicate_pct: 0.0
    limit_packets: 1000
    rate_mbit: null

  5qi_80:
    description: "Managed low-latency QoS anchor"
    delay_ms: 10
    jitter_ms: 1
    delay_distribution: normal
    loss_model: correlated
    loss_pct: 0.0001
    loss_correlation_pct: 5
    reorder_pct: 0.01
    reorder_correlation_pct: 50
    duplicate_pct: 0.0
    limit_packets: 1000
    rate_mbit: null

default_interface: "auto"
bidirectional: true
