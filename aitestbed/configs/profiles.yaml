# Network profiles for 6G AI traffic studies.
# Profile catalog per 3GPP SA4 contribution S4-260848 (Table C.Z-1).
#
# Asymmetric profiles use an optional `uplink:` sub-block. Base fields
# describe the symmetric / downlink case. When `uplink:` is present, egress
# uses (base ⊕ uplink) (shallow per-field merge), ingress uses base
# unchanged. Profiles without an `uplink:` block are treated as symmetric.

selected_profiles:
  - no_emulation
  - 6g_itu_hrllc
  - 5g_urban
  - wifi_good
  - cell_edge
  - satellite_leo
  - satellite_geo
  - congested
  - 5qi_7
  - 5qi_80

profiles:
  no_emulation:
    description: "Reference case with no tc/netem impairment applied (ideal baseline)"
    delay_ms: 0
    jitter_ms: 0
    delay_distribution: fixed
    loss_pct: 0.0
    loss_correlation_pct: 0
    reorder_pct: 0.0
    reorder_correlation_pct: 0
    duplicate_pct: 0.0
    limit_packets: null
    rate_mbit: null

  6g_itu_hrllc:
    description: "6G HRLLC operating point derived from ITU IMT-2030 (M.2160)"
    delay_ms: 1
    jitter_ms: 0.2
    delay_distribution: normal
    loss_pct: 0.001
    loss_correlation_pct: 10
    reorder_pct: 0.0
    reorder_correlation_pct: 0
    duplicate_pct: 0.0
    limit_packets: 2000
    rate_mbit: 300

  5g_urban:
    description: "Mainstream urban terrestrial cellular reference"
    delay_ms: 20
    jitter_ms: 5
    delay_distribution: normal
    loss_model: correlated
    loss_pct: 0.1
    loss_correlation_pct: 25
    reorder_pct: 0.02
    reorder_correlation_pct: 50
    duplicate_pct: 0.01
    limit_packets: 1000
    rate_mbit: 100

  wifi_good:
    description: "Non-3GPP local access with moderate contention (fictional average of common Wi-Fi configurations)"
    delay_ms: 30
    jitter_ms: 10
    delay_distribution: normal
    loss_model: correlated
    loss_pct: 0.1
    loss_correlation_pct: 30
    reorder_pct: 0.05
    reorder_correlation_pct: 50
    duplicate_pct: 0.02
    limit_packets: 800
    rate_mbit: 50

  cell_edge:
    description: "Weak radio and heavy-tail jitter case"
    delay_ms: 120
    jitter_ms: 30
    delay_distribution: paretonormal
    loss_model: gemodel
    loss_pct: 1.0
    loss_correlation_pct: 35
    reorder_pct: 0.1
    reorder_correlation_pct: 50
    duplicate_pct: 0.05
    limit_packets: 400
    rate_mbit: 5

  # ---------------------------------------------------------------------------
  # Asymmetric NTN profiles (S4-260848 Table C.Z-1).
  # Base block = downlink. `uplink:` block lists egress overrides only —
  # any field not listed under `uplink:` is inherited from the base.
  # ---------------------------------------------------------------------------

  satellite_leo:
    description: "LEO satellite (asymmetric uplink) — NTN-like latency stress"
    delay_ms: 22
    jitter_ms: 7
    delay_distribution: normal
    loss_pct: 0.5
    loss_correlation_pct: 40
    reorder_pct: 0.1
    reorder_correlation_pct: 15
    duplicate_pct: 0.0
    limit_packets: 10000
    rate_mbit: 100
    uplink:
      jitter_ms: 8
      loss_pct: 0.8
      loss_correlation_pct: 45
      reorder_pct: 0.05
      reorder_correlation_pct: 10
      limit_packets: 5000
      rate_mbit: 15

  satellite_geo:
    description: "GEO satellite (asymmetric uplink) — long-RTT remote access"
    delay_ms: 340
    jitter_ms: 15
    delay_distribution: normal
    loss_pct: 0.1
    loss_correlation_pct: 20
    reorder_pct: 0.0
    reorder_correlation_pct: 0
    duplicate_pct: 0.0
    limit_packets: 20000
    rate_mbit: 50
    uplink:
      jitter_ms: 18
      loss_pct: 0.2
      loss_correlation_pct: 25
      limit_packets: 10000
      rate_mbit: 3

  congested:
    description: "Bufferbloat and strong congestion stress case"
    delay_ms: 200
    jitter_ms: 50
    delay_distribution: pareto
    loss_model: gemodel
    loss_pct: 3.0
    loss_correlation_pct: 40
    reorder_pct: 0.2
    reorder_correlation_pct: 50
    duplicate_pct: 0.05
    limit_packets: 200
    rate_mbit: 1

  # ---------------------------------------------------------------------------
  # 5QI anchors (per S4-260848: delay_ms = PDB - 2.054 × jitter_ms when jitter > 0)
  # ---------------------------------------------------------------------------

  5qi_7:
    description: "5QI 7 Non-GBR — Voice / Live Streaming / Interactive Gaming (PDB 100ms, PER 1e-3)"
    delay_ms: 80
    jitter_ms: 10
    delay_distribution: normal
    loss_model: correlated
    loss_pct: 0.1
    loss_correlation_pct: 20
    reorder_pct: 0.02
    reorder_correlation_pct: 50
    duplicate_pct: 0.0
    limit_packets: 1000
    rate_mbit: null

  5qi_80:
    description: "5QI 80 Non-GBR — Low Latency eMBB / AR (PDB 10ms, PER 1e-6)"
    delay_ms: 8
    jitter_ms: 1
    delay_distribution: normal
    loss_model: correlated
    loss_pct: 0.0001
    loss_correlation_pct: 5
    reorder_pct: 0.01
    reorder_correlation_pct: 50
    duplicate_pct: 0.0
    limit_packets: 1000
    rate_mbit: null

# Default interface for network emulation (auto = detect)
default_interface: "auto"
bidirectional: true
